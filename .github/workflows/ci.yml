name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --group dev --native-tls

      - name: Import ADK agent
        env:
          OPENAI_API_KEY: test-key
        run: |
          uv run python - <<'PY'
          from agent.agent import app, root_agent
          assert app is not None
          assert root_agent is not None
          PY

      - name: Run tests
        run: PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 uv run pytest -q
